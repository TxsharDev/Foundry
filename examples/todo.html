<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            padding: 40px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial;
        }
        .app {
            width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h1 {
            font-size: 28px;
            color: #58a6ff;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 16px;
            color: #c9d1d9;
            font-size: 14px;
            width: 360px;
        }
        .add-btn {
            background-color: #238636;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
        }
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px 16px;
        }
        .todo-text {
            font-size: 14px;
            color: #c9d1d9;
        }
        .done-btn {
            background-color: #1f6feb;
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status {
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>Foundry Todo</h1>
        <div class="input-row">
            <div class="input-box">Type a task...</div>
            <div class="add-btn" onclick="addTodo()">Add</div>
        </div>
        <div id="list" class="todo-list">
            <div class="todo-item">
                <span class="todo-text">Build a GPU renderer</span>
                <div class="done-btn" onclick="markDone(this)">Done</div>
            </div>
            <div class="todo-item">
                <span class="todo-text">Parse HTML at compile time</span>
                <div class="done-btn" onclick="markDone(this)">Done</div>
            </div>
            <div class="todo-item">
                <span class="todo-text">Ship Foundry v0.1</span>
                <div class="done-btn" onclick="markDone(this)">Done</div>
            </div>
        </div>
        <div id="status" class="status">3 tasks remaining</div>
    </div>

    <script>
        var remaining = 3;
        function markDone() {
            remaining = remaining - 1;
            if (remaining < 0) { remaining = 0; }
            document.getElementById("status").setTextContent(String(remaining) + " tasks remaining");
        }
        function addTodo() {
            remaining = remaining + 1;
            document.getElementById("status").setTextContent(String(remaining) + " tasks remaining");
        }
    </script>
</body>
</html>
